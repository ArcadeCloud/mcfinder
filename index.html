<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCFinder - Minecraft Seed Map</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top Bar -->
      <header id="topbar">
        <div class="topbar-brand">
          <span class="brand-icon">&#9618;</span>
          <span class="brand-name">MCFinder</span>
        </div>
        <div class="topbar-controls">
          <div class="control-group">
            <label>Seed</label>
            <input type="text" id="seed-input" placeholder="Enter seed..." />
          </div>
          <button id="load-btn" class="btn btn-primary">Load</button>
          <button id="random-btn" class="btn">Random</button>
          <div class="control-group">
            <label>Platform</label>
            <select id="edition-select">
              <option value="java">Java</option>
              <option value="bedrock">Bedrock</option>
            </select>
          </div>
          <div class="control-group">
            <label>Version</label>
            <select id="version-select"></select>
          </div>
          <div class="control-group">
            <label>Dimension</label>
            <select id="dimension-select">
              <option value="overworld">Overworld</option>
              <option value="nether">Nether</option>
              <option value="end">End</option>
            </select>
          </div>
        </div>
      </header>

      <div id="main">
        <!-- Left Panel -->
        <aside id="panel">
          <!-- Go To -->
          <div class="panel-section">
            <div class="section-header">Navigate</div>
            <div class="nav-row">
              <input type="number" id="goto-x" placeholder="X" />
              <input type="number" id="goto-z" placeholder="Z" />
              <button id="goto-btn" class="btn btn-small">Go!</button>
              <button id="spawn-btn" class="btn btn-small">Spawn</button>
            </div>
          </div>

          <!-- Features -->
          <div class="panel-section">
            <div class="section-header">Features</div>
            <div class="feature-toggles">
              <label class="feature-toggle">
                <input type="checkbox" id="show-biomes" checked />
                <span class="toggle-swatch" style="background:#8DB360"></span>
                <span>Biomes</span>
              </label>
              <label class="feature-toggle">
                <input type="checkbox" id="show-grid" />
                <span class="toggle-swatch" style="background:#666"></span>
                <span>Grid</span>
              </label>
              <label class="feature-toggle">
                <input type="checkbox" id="show-coords" checked />
                <span class="toggle-swatch" style="background:#aaa"></span>
                <span>Coordinates</span>
              </label>
            </div>
          </div>

          <!-- Structures -->
          <div class="panel-section">
            <div class="section-header">Structures</div>
            <div id="structure-toggles" class="feature-toggles"></div>
          </div>

          <!-- Info -->
          <div class="panel-section">
            <div class="section-header">Info</div>
            <div id="info-panel" class="info-panel">
              <span class="info-hint">Hover over the map</span>
            </div>
          </div>
        </aside>

        <!-- Map -->
        <div id="map-wrap">
          <div id="map"></div>
          <div id="coords-display">X: 0, Z: 0</div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
